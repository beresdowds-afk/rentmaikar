name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsgo --noEmit
      - name: Vitest
        run: bunx vitest run

  onboarding-e2e-db:
    name: Onboarding registration DB E2E (Deno)
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x
      - name: Skip if secrets missing
        if: ${{ env.VITE_SUPABASE_URL == '' || env.SUPABASE_SERVICE_ROLE_KEY == '' }}
        run: echo "::warning::Skipping onboarding DB E2E — required secrets not set."
      - name: Registration + onboarding E2E
        if: ${{ env.VITE_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: |
          deno test -A \
            supabase/tests/registration-onboarding-e2e.test.ts \
            supabase/tests/onboarding-fanout-payload.test.ts \
            supabase/tests/onboarding-trigger-failure-recovery.test.ts

  playwright-e2e:
    name: Playwright browser E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Start dev server
        run: bun run dev &
        env:
          NODE_ENV: test
      - name: Wait for dev server
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8080 >/dev/null; then exit 0; fi
            sleep 2
          done
          echo "dev server never became ready" >&2
          exit 1
      - name: Run Playwright
        run: bunx playwright test
        env:
          E2E_BASE_URL: http://localhost:8080
